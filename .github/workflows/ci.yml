name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  smoke-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system OCR dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-por

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Materialize challenge assets
        run: python scripts/materialize_assets.py --force

      - name: Sync desafio 1 dependencies
        working-directory: desafio-1-assistente-dados
        run: uv sync

      - name: Sync desafio 2 dependencies
        working-directory: desafio-2-pipeline-documentos
        run: uv sync

      - name: Run desafio 1 unit tests
        working-directory: desafio-1-assistente-dados
        run: uv run python -m unittest discover -s tests -v

      - name: Run desafio 2 unit tests
        working-directory: desafio-2-pipeline-documentos
        run: uv run python -m unittest discover -s tests -v

      - name: Run desafio 1 smoke test
        working-directory: desafio-1-assistente-dados
        run: uv run python ../scripts/smoke_desafio_1.py

      - name: Run desafio 2 smoke test
        working-directory: desafio-2-pipeline-documentos
        run: uv run python ../scripts/smoke_desafio_2.py

  gemini-integration:
    runs-on: ubuntu-latest
    needs: smoke-tests
    env:
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

    steps:
      - name: Skip Gemini integration when secret is missing
        if: ${{ env.GOOGLE_API_KEY == '' }}
        run: echo "Skipping Gemini integration because GOOGLE_API_KEY is not configured."

      - name: Checkout repository
        if: ${{ env.GOOGLE_API_KEY != '' }}
        uses: actions/checkout@v4

      - name: Set up Python
        if: ${{ env.GOOGLE_API_KEY != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system OCR dependencies
        if: ${{ env.GOOGLE_API_KEY != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-por

      - name: Install uv
        if: ${{ env.GOOGLE_API_KEY != '' }}
        run: python -m pip install --upgrade pip uv

      - name: Materialize challenge assets
        if: ${{ env.GOOGLE_API_KEY != '' }}
        run: python scripts/materialize_assets.py --force

      - name: Sync desafio 1 dependencies
        if: ${{ env.GOOGLE_API_KEY != '' }}
        working-directory: desafio-1-assistente-dados
        run: uv sync

      - name: Sync desafio 2 dependencies
        if: ${{ env.GOOGLE_API_KEY != '' }}
        working-directory: desafio-2-pipeline-documentos
        run: uv sync

      - name: Run desafio 1 unit tests
        if: ${{ env.GOOGLE_API_KEY != '' }}
        working-directory: desafio-1-assistente-dados
        run: uv run python -m unittest discover -s tests -v

      - name: Run desafio 2 unit tests
        if: ${{ env.GOOGLE_API_KEY != '' }}
        working-directory: desafio-2-pipeline-documentos
        run: uv run python -m unittest discover -s tests -v

      - name: Run desafio 1 Gemini integration
        if: ${{ env.GOOGLE_API_KEY != '' }}
        working-directory: desafio-1-assistente-dados
        run: |
          uv run python - <<'PY'
          import traceback
          from src.agent.graph import ask

          try:
              result = ask("Quais sao os 3 clientes que mais gastaram?")
              if not result.get("answer"):
                  raise RuntimeError("No answer returned by desafio 1 agent")
              if not result.get("sql_query"):
                  raise RuntimeError("No SQL returned by desafio 1 agent")
              if not result.get("step_questions"):
                  raise RuntimeError("No analysis plan returned by desafio 1 agent")
              if not result.get("trace"):
                  raise RuntimeError("No execution trace returned by desafio 1 agent")
              print("desafio-1 Gemini integration passed")
          except BaseException as exc:
              print(
                  f"::error title=desafio-1 Gemini integration::{type(exc).__name__}: {exc}"
              )
              traceback.print_exc()
              raise
          PY

      - name: Run desafio 2 Gemini integration on a small sample
        if: ${{ env.GOOGLE_API_KEY != '' }}
        working-directory: desafio-2-pipeline-documentos
        run: |
          uv run python - <<'PY'
          import shutil
          import traceback
          from pathlib import Path
          from src.main import main

          try:
              sample_dir = Path("data/sample_raw")
              output_dir = Path("output/ci-sample")
              if sample_dir.exists():
                  shutil.rmtree(sample_dir)
              sample_dir.mkdir(parents=True, exist_ok=True)

              for pdf in sorted(Path("data/raw").glob("*.pdf"))[:3]:
                  shutil.copy2(pdf, sample_dir / pdf.name)

              main(sample_dir, output_dir)

              if not (output_dir / "resultados.csv").exists():
                  raise RuntimeError("Pipeline did not generate resultados.csv")
              print("desafio-2 Gemini integration passed")
          except BaseException as exc:
              print(
                  f"::error title=desafio-2 Gemini integration::{type(exc).__name__}: {exc}"
              )
              traceback.print_exc()
              raise
          PY
